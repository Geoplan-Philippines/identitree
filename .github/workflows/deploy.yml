name: Deploy

on:
  push:
    branches: [dev, staging, main]

env:
  API_IMAGE: geoplanoperation/identitree-api
  WEB_IMAGE: geoplanoperation/identitree-web

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🧠 Set environment
      - name: Set env
        id: vars
        run: |
          BRANCH=${GITHUB_REF##*/}

          if [ "$BRANCH" = "dev" ]; then ENV=dev; fi
          if [ "$BRANCH" = "staging" ]; then ENV=staging; fi
          if [ "$BRANCH" = "main" ]; then ENV=prod; fi

          echo "env=$ENV" >> $GITHUB_OUTPUT

      # 🔐 Login
      - name: Login DockerHub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" \
          | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # 🌐 API URL
      - name: Set API URL
        id: apiurl
        run: |
          if [ "${{ steps.vars.outputs.env }}" = "dev" ]; then
            echo "url=https://identitree-dev-api.geoplanph.com/api/v1" >> $GITHUB_OUTPUT
          fi

          if [ "${{ steps.vars.outputs.env }}" = "staging" ]; then
            echo "url=https://identitree-stg-api.geoplanph.com/api/v1" >> $GITHUB_OUTPUT
          fi

          if [ "${{ steps.vars.outputs.env }}" = "prod" ]; then
            echo "url=https://identitree-api.geoplanph.com/api/v1" >> $GITHUB_OUTPUT
          fi

      # 🐳 Build API
      - name: Build API
        run: |
          docker build \
            -t $API_IMAGE:${{ steps.vars.outputs.env }}-latest \
            -f apps/api/Dockerfile .

      # 🌐 Build WEB
      - name: Build WEB
        run: |
          docker build \
            -t $WEB_IMAGE:${{ steps.vars.outputs.env }}-latest \
            -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ steps.apiurl.outputs.url }} \
            .

      # 📤 Push
      - name: Push images
        run: |
          docker push $API_IMAGE:${{ steps.vars.outputs.env }}-latest
          docker push $WEB_IMAGE:${{ steps.vars.outputs.env }}-latest

      # 🚀 Deploy
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            ENV=${{ steps.vars.outputs.env }}
            cd "$HOME/docker-apps/identitree/$ENV"

            export TAG=$ENV-latest

            echo "Deploying $ENV using $TAG"

            docker compose pull
            docker compose up -d db
            sleep 10

            docker compose run --rm api \
              sh -c "npx prisma migrate deploy"

            docker compose up -d

            docker image prune -f
