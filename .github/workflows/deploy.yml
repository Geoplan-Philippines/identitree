name: Deploy

on:
  push:
    branches: [dev, staging, main]

env:
  API_IMAGE: geoplanoperation/identitree-api
  WEB_IMAGE: geoplanoperation/identitree-web

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🧠 Set environment + tag
      - name: Set env + tag
        id: vars
        run: |
          BRANCH=${GITHUB_REF##*/}

          if [ "$BRANCH" = "dev" ]; then ENV=dev; fi
          if [ "$BRANCH" = "staging" ]; then ENV=staging; fi
          if [ "$BRANCH" = "main" ]; then ENV=prod; fi

          TAG=$ENV-${GITHUB_SHA}

          echo "env=$ENV" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # 🔐 Docker Hub login
      - name: Login DockerHub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" \
          | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # 🧠 Decide API URL per environment
      - name: Set API URL
        id: apiurl
        run: |
          if [ "${{ steps.vars.outputs.env }}" = "dev" ]; then
            echo "url=https://identitree-dev.geoplanph.com/api" >> $GITHUB_OUTPUT
          fi

          if [ "${{ steps.vars.outputs.env }}" = "staging" ]; then
            echo "url=https://identitree-stg.geoplanph.com/api" >> $GITHUB_OUTPUT
          fi

          if [ "${{ steps.vars.outputs.env }}" = "prod" ]; then
            echo "url=https://identitree.geoplanph.com/api" >> $GITHUB_OUTPUT
          fi

      # 🐳 Build API
      - name: Build API
        run: |
          docker build \
            -t $API_IMAGE:${{ steps.vars.outputs.tag }} \
            -f apps/api/Dockerfile .

      # 🌐 Build WEB (with env injection)
      - name: Build WEB
        run: |
          docker build \
            -t $WEB_IMAGE:${{ steps.vars.outputs.tag }} \
            -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ steps.apiurl.outputs.url }} \
            .

      # 📤 Push images
      - name: Push images
        run: |
          docker push $API_IMAGE:${{ steps.vars.outputs.tag }}
          docker push $WEB_IMAGE:${{ steps.vars.outputs.tag }}

      # 🚀 Deploy to VPS
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            ENV=${{ steps.vars.outputs.env }}
            TAG=${{ steps.vars.outputs.tag }}

            case "$ENV" in
              dev) DEPLOY_DIR="$HOME/docker-apps/identitree/dev" ;;
              staging) DEPLOY_DIR="$HOME/docker-apps/identitree/stg" ;;
              prod) DEPLOY_DIR="$HOME/docker-apps/identitree/prod" ;;
              *) echo "Unknown environment: $ENV"; exit 1 ;;
            esac

            cd "$DEPLOY_DIR"

            export TAG=$TAG

            echo "Deploying $ENV with tag $TAG"

            # 📦 Pull latest images
            docker compose pull

            # 🧠 Prisma migration FIRST (important)
            docker compose up -d db
            docker compose run --rm api \
              npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma

            # 🚀 Restart containers
            docker compose up -d

            # 🧹 cleanup
            docker image prune -f
