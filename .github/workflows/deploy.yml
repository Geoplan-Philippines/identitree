name: Deploy

on:
  push:
    branches: [dev, staging, main]

env:
  API_IMAGE: geoplanoperation/identitree-api
  WEB_IMAGE: geoplanoperation/identitree-web

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🧠 Set environment
      - name: Set env
        id: vars
        run: |
          BRANCH=${GITHUB_REF##*/}

          if [ "$BRANCH" = "dev" ]; then ENV=dev; fi
          if [ "$BRANCH" = "staging" ]; then ENV=staging; fi
          if [ "$BRANCH" = "main" ]; then ENV=prod; fi

          if [ -z "$ENV" ]; then
            echo "Invalid branch"
            exit 1
          fi

          echo "env=$ENV" >> $GITHUB_OUTPUT

      # 🔐 Docker login
      - name: Login DockerHub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" \
          | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # 🌐 API URL per environment
      - name: Set API URL
        id: apiurl
        run: |
          if [ "${{ steps.vars.outputs.env }}" = "dev" ]; then
            echo "url=https://identitree-dev-api.geoplanph.com/api/v1" >> $GITHUB_OUTPUT
          fi

          if [ "${{ steps.vars.outputs.env }}" = "staging" ]; then
            echo "url=https://identitree-stg-api.geoplanph.com/api/v1" >> $GITHUB_OUTPUT
          fi

          if [ "${{ steps.vars.outputs.env }}" = "prod" ]; then
            echo "url=https://identitree-api.geoplanph.com/api/v1" >> $GITHUB_OUTPUT
          fi

      # 🐳 Build API (ONLY latest tag)
      - name: Build API
        run: |
          docker build \
            -t $API_IMAGE:${{ steps.vars.outputs.env }}-latest \
            -f apps/api/Dockerfile .

      # 🌐 Build WEB (ONLY latest tag)
      - name: Build WEB
        run: |
          docker build \
            -t $WEB_IMAGE:${{ steps.vars.outputs.env }}-latest \
            -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ steps.apiurl.outputs.url }} \
            .

      # 📤 Push images
      - name: Push images
        run: |
          docker push $API_IMAGE:${{ steps.vars.outputs.env }}-latest
          docker push $WEB_IMAGE:${{ steps.vars.outputs.env }}-latest

      # 🚀 Deploy to VPS
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            ENV=${{ steps.vars.outputs.env }}

            case "$ENV" in
              dev) DEPLOY_DIR="$HOME/docker-apps/identitree/dev" ;;
              staging) DEPLOY_DIR="$HOME/docker-apps/identitree/stg" ;;
              prod) DEPLOY_DIR="$HOME/docker-apps/identitree/prod" ;;
              *) echo "Unknown environment: $ENV"; exit 1 ;;
            esac

            cd "$DEPLOY_DIR"

            echo "Deploying $ENV using latest images"

            # 📦 Pull latest images (overwrites local reference)
            docker compose pull

            # 🚀 Restart only changed containers (NO docker down!)
            docker compose up -d --force-recreate

            # 🧠 Prisma migration (KEEP THIS EXACTLY)
            docker compose run --rm api \
              sh -lc 'cd /app/apps/api && npx prisma migrate deploy --schema=prisma/schema.prisma'

            # 🧹 Cleanup unused images/layers
            docker image prune -f
